name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: https://example.movemate.app
      NEXT_PUBLIC_APP_URL: https://example.movemate.app
      NEXT_PUBLIC_APP_ENV: ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_anon_key
      SUPABASE_SERVICE_ROLE_KEY: ci_service_role_key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_CONNECT_RETURN_URL: https://example.movemate.app/carrier/onboarding
      STRIPE_CONNECT_REFRESH_URL: https://example.movemate.app/carrier/onboarding
      SENTRY_RELEASE: ci-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Production build
        run: npm run build
