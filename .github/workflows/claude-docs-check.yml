name: Operations Docs Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "AUTHORITY.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "TASK-RULES.md"
      - ".claude/project-ops.md"
      - ".claude/lock-groups.md"
      - ".env.example"
      - ".github/workflows/ci.yml"
      - ".github/workflows/claude-docs-check.yml"
      - "config/required-production-env.json"
      - "docs/operations/**"
      - "next.config.js"
      - "package.json"
      - "src/app/api/admin/route.ts"
      - "src/app/api/cron/**"
      - "src/app/api/health/route.ts"
      - "src/lib/data/bootstrap.ts"
      - "src/lib/env.ts"
      - "vercel.json"
  push:
    branches:
      - main
    paths:
      - "AUTHORITY.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "TASK-RULES.md"
      - ".claude/project-ops.md"
      - ".claude/lock-groups.md"
      - ".env.example"
      - ".github/workflows/ci.yml"
      - ".github/workflows/claude-docs-check.yml"
      - "config/required-production-env.json"
      - "docs/operations/**"
      - "next.config.js"
      - "package.json"
      - "src/app/api/admin/route.ts"
      - "src/app/api/cron/**"
      - "src/app/api/health/route.ts"
      - "src/lib/data/bootstrap.ts"
      - "src/lib/env.ts"
      - "vercel.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operations-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate operations docs and environment contract
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const requiredFiles = [
            "AUTHORITY.md",
            "AGENTS.md",
            "CLAUDE.md",
            "TASK-RULES.md",
            ".claude/project-ops.md",
            ".claude/lock-groups.md",
            ".env.example",
            ".github/workflows/ci.yml",
            "config/required-production-env.json",
            "docs/operations/environment-model.md",
            "docs/operations/smoke-tests.md",
            "docs/operations/deploy-project-setup.md",
            "docs/operations/completed.md",
            "docs/operations/todolist.md",
          ];

          const missingFiles = requiredFiles.filter((file) => !fs.existsSync(file));

          if (missingFiles.length > 0) {
            console.error("Missing required operations files:");
            for (const file of missingFiles) {
              console.error(`- ${file}`);
            }
            process.exit(1);
          }

          const envExample = fs.readFileSync(".env.example", "utf8");
          const envKeys = new Set(
            envExample
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith("#"))
              .map((line) => line.split("=")[0].trim()),
          );

          const requiredProductionEnv = JSON.parse(
            fs.readFileSync("config/required-production-env.json", "utf8"),
          );
          const requiredOpsEnv = [
            "NEXT_PUBLIC_SITE_URL",
            "NEXT_PUBLIC_APP_URL",
            "NEXT_PUBLIC_APP_ENV",
            "GOOGLE_MAPS_API_KEY",
            "NEXT_PUBLIC_GOOGLE_MAPS_KEY",
            "UPSTASH_REDIS_REST_URL",
            "UPSTASH_REDIS_REST_TOKEN",
            "STRIPE_CONNECT_RETURN_URL",
            "STRIPE_CONNECT_REFRESH_URL",
            "RESEND_API_KEY",
            "RESEND_FROM_EMAIL",
            "NEXT_PUBLIC_SENTRY_DSN",
            "SENTRY_RELEASE",
            "SENTRY_AUTH_TOKEN",
            "SENTRY_ORG",
            "SENTRY_PROJECT",
            "NEXT_PUBLIC_VAPID_PUBLIC_KEY",
            "VAPID_PRIVATE_KEY",
            "VAPID_SUBJECT",
            "ADMIN_EMAILS",
            "CRON_SECRET",
            "VERCEL_CRON_SECRET",
            "SMOKE_BOOTSTRAP_SECRET",
            "RUN_SUPABASE_INTEGRATION",
          ];

          const requiredEnv = [...new Set([...requiredProductionEnv, ...requiredOpsEnv])];
          const missingEnv = requiredEnv.filter((key) => !envKeys.has(key));

          if (missingEnv.length > 0) {
            console.error("Missing environment variables in .env.example:");
            for (const key of missingEnv) {
              console.error(`- ${key}`);
            }
            process.exit(1);
          }

          const fileExpectations = [
            {
              file: "AUTHORITY.md",
              snippets: [
                "MoveMate Authority Map",
                "AGENTS.md",
                "Multi-Tool Policy",
                "Use `MoveMate` for product-facing and founder-facing language.",
                "The legacy Moverrr blueprint has been deleted.",
              ],
            },
            {
              file: "AGENTS.md",
              snippets: [
                "MoveMate — Universal Agent Contract",
                "This file is the universal contract for every AI tool working in this repo",
                "GitHub is the live work system. Markdown is derived.",
                "Derived snapshots stay derived. `docs/operations/**` is never a claimable queue.",
              ],
            },
            {
              file: "CLAUDE.md",
              snippets: [
                "Claude Code Overlay",
                "Universal truth lives in [AGENTS.md]",
                "gstack is the approved workflow layer for Claude in this repo.",
                "Use the `/session-start` skill at the top of a fresh session.",
              ],
            },
            {
              file: "TASK-RULES.md",
              snippets: [
                "MoveMate Task Rules",
                "The live task system is GitHub-first.",
                "The universal contract is [`AGENTS.md`](AGENTS.md)",
                "For product invariants, parallelism lanes, lock groups, review model, and escalation",
              ],
            },
            {
              file: ".claude/project-ops.md",
              snippets: [
                "MoveMate Project Ops",
                "GitHub is authoritative for live state.",
                "project fields for queue metadata when GitHub project scopes are available",
                "The founder should not be asked to inspect raw diffs by default.",
              ],
            },
            {
              file: ".claude/lock-groups.md",
              snippets: [
                "MoveMate Lock Groups",
                "Only one build agent should own one lock group at a time.",
              ],
            },
            {
              file: ".github/workflows/ci.yml",
              snippets: [
                "npm ci",
                "npm run check",
                "npm run test",
                "npm run build",
                "NEXT_PUBLIC_SUPABASE_URL",
                "STRIPE_WEBHOOK_SECRET",
              ],
            },
            {
              file: "docs/operations/environment-model.md",
              snippets: [
                "GitHub issues and pull requests",
                "docs/operations/todolist.md",
                "docs/operations/completed.md",
                "Required build / deploy variables",
                "Server-only secrets",
                "Local-only toggles",
                "config/required-production-env.json",
                "`CRON_SECRET`",
                "`SMOKE_BOOTSTRAP_SECRET`",
                "`RUN_SUPABASE_INTEGRATION`",
              ],
            },
            {
              file: "docs/operations/smoke-tests.md",
              snippets: [
                "`npm run check`",
                "`npm run test`",
                "`npm run build`",
                "`/api/health`",
                "`SMOKE_BOOTSTRAP_SECRET`",
                "`/api/admin`",
                "`/api/cron/trip-freshness-checks`",
                "`/api/cron/payout-auto-release`",
              ],
            },
            {
              file: "docs/operations/deploy-project-setup.md",
              snippets: [
                "GitHub issues",
                "pull requests",
                "derived artifacts only",
                "Vercel",
                "Supabase",
                "Stripe",
                "`npm run ops:sync-backlog`",
                "`CI`",
                "`Operations Docs Check`",
              ],
            },
            {
              file: "docs/operations/completed.md",
              snippets: [
                "Derived artifact only.",
                "GitHub",
              ],
            },
            {
              file: "docs/operations/todolist.md",
              snippets: [
                "Derived artifact only.",
                "GitHub",
              ],
            },
          ];

          let failed = false;

          for (const { file, snippets } of fileExpectations) {
            const content = fs.readFileSync(file, "utf8");

            for (const snippet of snippets) {
              if (!content.includes(snippet)) {
                console.error(`Missing required content in ${file}: ${snippet}`);
                failed = true;
              }
            }
          }

          if (failed) {
            process.exit(1);
          }

          console.log("Operations docs and environment contract are in sync.");
          NODE
