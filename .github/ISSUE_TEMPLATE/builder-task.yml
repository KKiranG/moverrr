name: Builder task
description: Create a scoped implementation task for the live GitHub work system.
title: "[Builder Task]: "
labels:
  - "type:builder-task"
body:
  - type: markdown
    attributes:
      value: |
        Use this for implementation work that should live as a GitHub issue first and a markdown digest second.
  - type: input
    id: summary
    attributes:
      label: Outcome summary
      description: One-line statement of the user or system outcome we need.
      placeholder: Ship the GitHub-backed task operating system for MoveMate.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant product, technical, or operational context.
      placeholder: This work replaces manual backlog markdown with GitHub issues, labels, and linked PRs.
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      description: Choose the primary execution lane that owns the work.
      options:
        - lane:ux-builder
        - lane:ui-builder
        - lane:backend-builder
        - lane:trust-safety
        - lane:performance-reliability
        - lane:scout
        - lane:docs-sync
        - lane:review
        - lane:deploy
        - lane:testing
    validations:
      required: true
  - type: dropdown
    id: state
    attributes:
      label: State
      description: Choose the current queue state for this issue.
      options:
        - state:inbox
        - state:shaping
        - state:ready
        - state:claimed
        - state:in-progress
        - state:pr-open
        - state:needs-review
        - state:needs-founder-decision
        - state:blocked
        - state:duplicate
        - state:deferred
    validations:
      required: true
  - type: input
    id: lock_group
    attributes:
      label: Lock group
      description: Shared resource or area that must not be edited in parallel. Use `none` if not needed.
      placeholder: github-control-plane
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:p0
        - priority:p1
        - priority:p2
        - priority:p3
        - priority:p4
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - size:xs
        - size:s
        - size:m
        - size:l
        - size:xl
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - risk:low
        - risk:medium
        - risk:high
        - risk:critical
    validations:
      required: true
  - type: checkboxes
    id: affected_surfaces
    attributes:
      label: Affected surfaces
      description: Check every surface touched by this task.
      options:
        - label: surface:customer-web
        - label: surface:carrier-web
        - label: surface:admin-web
        - label: surface:mobile-web
        - label: surface:api
        - label: surface:data
        - label: surface:payments
        - label: surface:ops
        - label: surface:github
        - label: surface:docs
        - label: surface:design-system
  - type: textarea
    id: done_when
    attributes:
      label: Done when
      description: Explicit acceptance criteria.
      placeholder: |
        - Issue forms and labels exist in the repo.
        - Sync script regenerates derived digests from GitHub.
    validations:
      required: true
  - type: textarea
    id: blocked_by
    attributes:
      label: Blocked by
      description: Issue numbers, external dependencies, or `none`.
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: safe_parallelism
    attributes:
      label: Safe parallelism
      description: Call out what others can work on safely while this issue is active.
      placeholder: Other workers can change app surfaces, but should avoid .github and the GitHub sync scripts.
    validations:
      required: true
  - type: dropdown
    id: founder_decision
    attributes:
      label: Founder decision
      options:
        - No founder decision needed
        - Founder decision needed before start
        - Founder decision needed during implementation
        - Founder decision already captured
    validations:
      required: true
  - type: textarea
    id: founder_decision_detail
    attributes:
      label: Founder decision detail
      description: Decision question, constraint, or existing answer. Use `none` if not applicable.
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: verification_plan
    attributes:
      label: Verification plan
      description: Commands, manual checks, or rollout evidence needed before closing.
      placeholder: |
        - Run the label bootstrap in dry-run and real mode.
        - Run the backlog sync in dry-run and inspect generated markdown.
    validations:
      required: true
